<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <title>Player - Quiz Pro</title>
    <link rel="icon" type="image/png" href="DARWIN.png">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at bottom left, #1e1b4b, #0f172a); 
            min-height: 100vh; 
            color: white; 
            margin: 0;
            overflow-x: hidden;
        }
        .glass { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        .timer-low { 
            color: #f87171; 
            animation: pulse 1s infinite; 
        }
        @keyframes pulse { 
            0%, 100% { opacity: 1; } 
            50% { opacity: 0.5; } 
        }
    </style>
</head>
<body class="relative flex items-center justify-center p-4 min-h-screen">

    <div id="falling-pattern-root" class="absolute inset-0 z-0 pointer-events-none w-full h-full overflow-hidden"></div>

    <div class="relative z-10 w-full flex justify-center items-center">
        <div id="setup-ui" class="glass p-8 rounded-[2.5rem] w-full max-w-md shadow-2xl">
            <h2 class="text-2xl font-extrabold mb-2 text-purple-400">Join the Quiz</h2>
            <p class="text-slate-400 text-sm mb-6">Enter your name to register for the live session.</p>
            <input type="text" id="team-name" placeholder="YOUR NAME / TEAM" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl mb-6 font-bold tracking-widest uppercase focus:outline-none focus:border-purple-500 text-center">
            <button id="join-btn" onclick="joinGame()" class="w-full bg-purple-600 hover:bg-purple-500 p-4 rounded-2xl font-black uppercase tracking-widest transition-all active:scale-95">Connect to Live</button>
        </div>

        <div id="game-ui" class="hidden w-full max-w-2xl text-center">
            <div class="glass p-6 rounded-3xl mb-6 flex justify-between items-center">
                <div class="text-left">
                    <p class="text-[10px] font-bold text-purple-400 uppercase tracking-widest">Active Team</p>
                    <h3 id="display-team" class="font-black text-xl uppercase italic">---</h3>
                </div>
                <div id="timer-box" class="hidden flex flex-col items-end">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Time Remaining</p>
                    <h3 id="timer-seconds" class="font-black text-2xl text-amber-400">25s</h3>
                </div>
            </div>

            <div id="waiting-state" class="py-20">
                <div class="animate-bounce mb-6 text-6xl">⏳</div>
                <h2 class="text-3xl font-extrabold text-slate-300">Waiting for Question...</h2>
            </div>

            <div id="answer-state" class="hidden">
                <div id="pts-badge" class="inline-block bg-amber-400 text-slate-900 px-4 py-1 rounded-full text-xs font-black mb-4">0 POINTS</div>
                <h2 id="current-q" class="text-2xl md:text-3xl font-bold mb-8 text-white px-2">...</h2>
                
                <div id="input-container" class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                    <button onclick="selectOption('A')" id="btn-optA" class="bg-white/5 hover:bg-purple-600/30 border border-white/10 p-5 rounded-2xl text-left font-semibold text-lg transition-all active:scale-95 flex items-center gap-3">
                        <span class="bg-purple-600 text-white w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">A</span>
                        <span id="text-optA" class="tracking-wide">...</span>
                    </button>
                    <button onclick="selectOption('B')" id="btn-optB" class="bg-white/5 hover:bg-purple-600/30 border border-white/10 p-5 rounded-2xl text-left font-semibold text-lg transition-all active:scale-95 flex items-center gap-3">
                        <span class="bg-purple-600 text-white w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">B</span>
                        <span id="text-optB" class="tracking-wide">...</span>
                    </button>
                    <button onclick="selectOption('C')" id="btn-optC" class="bg-white/5 hover:bg-purple-600/30 border border-white/10 p-5 rounded-2xl text-left font-semibold text-lg transition-all active:scale-95 flex items-center gap-3">
                        <span class="bg-purple-600 text-white w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">C</span>
                        <span id="text-optC" class="tracking-wide">...</span>
                    </button>
                    <button onclick="selectOption('D')" id="btn-optD" class="bg-white/5 hover:bg-purple-600/30 border border-white/10 p-5 rounded-2xl text-left font-semibold text-lg transition-all active:scale-95 flex items-center gap-3">
                        <span class="bg-purple-600 text-white w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">D</span>
                        <span id="text-optD" class="tracking-wide">...</span>
                    </button>
                </div>

                <div id="blind-feedback" class="hidden mt-6 p-6 border-2 border-dashed border-white/20 rounded-3xl">
                    <p id="status-text" class="text-emerald-400 font-bold mb-2 uppercase tracking-widest">Choice Locked In</p>
                    <p id="sub-status" class="text-slate-400 text-sm mb-4 italic">Waiting for host to reveal verified solution...</p>
                    
                    <div id="reveal-box" class="hidden bg-emerald-500/10 p-5 rounded-2xl border border-emerald-500/30">
                        <p class="text-[10px] uppercase text-emerald-400 font-bold mb-1 tracking-wider">Correct Answer Option</p>
                        <p id="reveal-answer" class="text-3xl font-black text-white">---</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="text/babel">
        const { motion } = Motion; // Bind framer-motion variables from global CDN reference

        function FallingPattern({
            color = 'rgba(147, 51, 234, 0.4)', // Using custom soft transparent purple for matrix styling
            backgroundColor = 'transparent', 
            duration = 160,
            blurIntensity = '4px',
            density = 1,
            className = ""
        }) {
            const generateBackgroundImage = () => {
                const patterns = [
                    `radial-gradient(4px 100px at 0px 235px, ${color}, transparent)`,
                    `radial-gradient(4px 100px at 300px 235px, ${color}, transparent)`,
                    `radial-gradient(1.5px 1.5px at 150px 117.5px, ${color} 100%, transparent 150%)`,
                    `radial-gradient(4px 100px at 0px 252px, ${color}, transparent)`,
                    `radial-gradient(4px 100px at 300px 252px, ${color}, transparent)`,
                    `radial-gradient(1.5px 1.5px at 150px 126px, ${color} 100%, transparent 150%)`,
                    `radial-gradient(4px 100px at 0px 150px, ${color}, transparent)`,
                    `radial-gradient(4px 100px at 300px 150px, ${color}, transparent)`,
                    `radial-gradient(1.5px 1.5px at 150px 75px, ${color} 100%, transparent 150%)`,
                    `radial-gradient(4px 100px at 0px 253px, ${color}, transparent)`,
                    `radial-gradient(4px 100px at 300px 253px, ${color}, transparent)`,
                    `radial-gradient(1.5px 1.5px at 150px 126.5px, ${color} 100%, transparent 150%)`,
                    `radial-gradient(4px 100px at 0px 204px, ${color}, transparent)`,
                    `radial-gradient(4px 100px at 300px 204px, ${color}, transparent)`,
                    `radial-gradient(1.5px 1.5px at 150px 102px, ${color} 100%, transparent 150%)`,
                    `radial-gradient(4px 100px at 0px 134px, ${color}, transparent)`,
                    `radial-gradient(4px 100px at 300px 134px, ${color}, transparent)`,
                    `radial-gradient(1.5px 1.5px at 150px 67px, ${color} 100%, transparent 150%)`,
                    `radial-gradient(4px 100px at 0px 179px, ${color}, transparent)`,
                    `radial-gradient(4px 100px at 300px 179px, ${color}, transparent)`,
                    `radial-gradient(1.5px 1.5px at 150px 89.5px, ${color} 100%, transparent 150%)`,
                    `radial-gradient(4px 100px at 0px 299px, ${color}, transparent)`,
                    `radial-gradient(4px 100px at 300px 299px, ${color}, transparent)`,
                    `radial-gradient(1.5px 1.5px at 150px 149.5px, ${color} 100%, transparent 150%)`,
                    `radial-gradient(4px 100px at 0px 215px, ${color}, transparent)`,
                    `radial-gradient(4px 100px at 300px 215px, ${color}, transparent)`,
                    `radial-gradient(1.5px 1.5px at 150px 107.5px, ${color} 100%, transparent 150%)`,
                    `radial-gradient(4px 100px at 0px 281px, ${color}, transparent)`,
                    `radial-gradient(4px 100px at 300px 281px, ${color}, transparent)`,
                    `radial-gradient(1.5px 1.5px at 150px 140.5px, ${color} 100%, transparent 150%)`,
                    `radial-gradient(4px 100px at 0px 158px, ${color}, transparent)`,
                    `radial-gradient(4px 100px at 300px 158px, ${color}, transparent)`,
                    `radial-gradient(1.5px 1.5px at 150px 79px, ${color} 100%, transparent 150%)`,
                    `radial-gradient(4px 100px at 0px 210px, ${color}, transparent)`,
                    `radial-gradient(4px 100px at 300px 210px, ${color}, transparent)`,
                    `radial-gradient(1.5px 1.5px at 150px 105px, ${color} 100%, transparent 150%)`
                ];
                return patterns.join(', ');
            };

            // Added missing 36th item to guarantee a proper match with startPositions & endPositions arrays
            const backgroundSizes = [
                '300px 235px','300px 235px','300px 235px',
                '300px 252px','300px 252px','300px 252px',
                '300px 150px','300px 150px','300px 150px',
                '300px 253px','300px 253px','300px 253px',
                '300px 204px','300px 204px','300px 204px',
                '300px 134px','300px 134px','300px 134px',
                '300px 179px','300px 179px','300px 179px',
                '300px 299px','300px 299px','300px 299px',
                '300px 215px','300px 215px','300px 215px',
                '300px 281px','300px 281px','300px 281px',
                '300px 158px','300px 158px','300px 158px',
                '300px 210px','300px 210px','300px 210px'
            ].join(', ');

            const startPositions = '0px 220px, 3px 220px, 151.5px 337.5px, 25px 24px, 28px 24px, 176.5px 150px, 50px 16px, 53px 16px, 201.5px 91px, 75px 224px, 78px 224px, 226.5px 230.5px, 100px 19px, 103px 19px, 251.5px 121px, 125px 120px, 128px 120px, 276.5px 187px, 150px 31px, 153px 31px, 301.5px 120.5px, 175px 235px, 178px 235px, 326.5px 384.5px, 200px 121px, 203px 121px, 351.5px 228.5px, 225px 224px, 228px 224px, 376.5px 364.5px, 250px 26px, 253px 26px, 401.5px 105px, 275px 75px, 278px 75px, 426.5px 180px';
            const endPositions = '0px 6800px, 3px 6800px, 151.5px 6917.5px, 25px 13632px, 28px 13632px, 176.5px 13758px, 50px 5416px, 53px 5416px, 201.5px 5491px, 75px 17175px, 78px 17175px, 226.5px 17301.5px, 100px 5119px, 103px 5119px, 251.5px 5221px, 125px 8428px, 128px 8428px, 276.5px 8495px, 150px 9876px, 153px 9876px, 301.5px 9965.5px, 175px 13391px, 178px 13391px, 326.5px 13540.5px, 200px 14741px, 203px 14741px, 351.5px 14848.5px, 225px 18770px, 228px 18770px, 376.5px 18910.5px, 250px 5082px, 253px 5082px, 401.5px 5161px, 275px 6375px, 278px 6375px, 426.5px 6480px';

            return (
                <div className={`relative h-full w-full ${className}`}>
                    <motion.div
                        initial={{ opacity: 0 }}
                        animate={{ opacity: 1 }}
                        transition={{ duration: 0.5 }}
                        className="w-full h-full"
                    >
                        <motion.div
                            className="relative w-full h-full z-0"
                            style={{
                                backgroundColor,
                                backgroundImage: generateBackgroundImage(),
                                backgroundSize: backgroundSizes,
                            }}
                            variants={{
                                initial: { backgroundPosition: startPositions },
                                animate: {
                                    backgroundPosition: [startPositions, endPositions],
                                    transition: {
                                        duration: duration,
                                        ease: 'linear',
                                        repeat: Infinity,
                                    },
                                },
                            }}
                            initial="initial"
                            animate="animate"
                        />
                    </motion.div>
                    <div
                        className="absolute inset-0 z-1 pointer-events-none"
                        style={{
                            backdropFilter: `blur(${blurIntensity})`,
                            backgroundImage: `radial-gradient(circle at 50% 50%, transparent 0, transparent 2px, rgba(15, 23, 42, 0.1) 2px)`,
                            backgroundSize: `${8 * density}px ${8 * density}px`,
                        }}
                    />
                </div>
            );
        }

        // Target wrapper element and render the final layout element pipeline
        const root = ReactDOM.createRoot(document.getElementById('falling-pattern-root'));
        root.render(<FallingPattern />);
    </script>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwK2LR8MlREunfGh3bSC0wPZ2oD7N9_YNN0M941hi5rsCwOmNl7TXmNyklwNN3qNRKQ/exec";
        let teamName = "", currentCorrectAns = "", currentPoints = 0, hasSubmitted = false;
        let timeLeft = 25; 
        let timerInterval = null;
        let activeQuestionId = "";

        async function joinGame() {
            const input = document.getElementById('team-name');
            const btn = document.getElementById('join-btn');
            teamName = input.value.trim().toUpperCase();
            if(!teamName) return alert("Please enter a valid handle name description.");

            btn.innerText = "REGISTERING...";
            btn.disabled = true;

            try {
                await fetch(SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors", 
                    body: JSON.stringify({ action: "registerPlayer", user: teamName })
                });
                document.getElementById('display-team').innerText = teamName;
                document.getElementById('setup-ui').classList.add('hidden');
                document.getElementById('game-ui').classList.remove('hidden');
                setInterval(syncPlayer, 1500);
            } catch (e) { alert("Error connecting to real-time service host node."); }
        }

        async function syncPlayer() {
            try {
                const res = await fetch(`${SCRIPT_URL}?cb=${Date.now()}`);
                const data = await res.json();
                
                if (data.status === "ACTIVE") {
                    document.getElementById('waiting-state').classList.add('hidden');
                    document.getElementById('answer-state').classList.remove('hidden');
                    document.getElementById('timer-box').classList.remove('hidden');
                    
                    if (activeQuestionId !== data.question) {
                        activeQuestionId = data.question;
                        resetForNewQuestion(data);
                    }
                    
                    document.getElementById('current-q').innerText = data.question;
                    document.getElementById('pts-badge').innerText = data.points + " POINTS";
                    
                    if(data.opts) {
                        document.getElementById('text-optA').innerText = data.opts.A || "...";
                        document.getElementById('text-optB').innerText = data.opts.B || "...";
                        document.getElementById('text-optC').innerText = data.opts.C || "...";
                        document.getElementById('text-optD').innerText = data.opts.D || "...";
                    }

                    currentCorrectAns = data.answer.toUpperCase();
                    currentPoints = data.points;

                    if (data.reveal === true || data.reveal === "true" || data.revealAnswer === true) {
                        document.getElementById('reveal-box').classList.remove('hidden');
                        document.getElementById('reveal-answer').innerText = `${currentCorrectAns}: ${data.opts ? data.opts[currentCorrectAns] : ''}`;
                        document.getElementById('sub-status').innerText = "Host has revealed the official result details!";
                    }
                } else {
                    document.getElementById('waiting-state').classList.remove('hidden');
                    document.getElementById('answer-state').classList.add('hidden');
                    document.getElementById('timer-box').classList.add('hidden');
                    activeQuestionId = "";
                    clearInterval(timerInterval);
                }
            } catch (e) { console.error(e); }
        }

        function resetForNewQuestion(data) {
            hasSubmitted = false;
            timeLeft = data.time || data.t || 25; 
            
            document.getElementById('input-container').classList.remove('hidden');
            document.getElementById('blind-feedback').classList.add('hidden');
            document.getElementById('reveal-box').classList.add('hidden');
            document.getElementById('sub-status').innerText = "Waiting for host to reveal answer...";
            document.getElementById('timer-seconds').innerText = timeLeft + "s";
            document.getElementById('timer-seconds').classList.remove('timer-low');

            ['A', 'B', 'C', 'D'].forEach(opt => {
                const el = document.getElementById(`btn-opt${opt}`);
                el.disabled = false;
                el.className = "bg-white/5 hover:bg-purple-600/30 border border-white/10 p-5 rounded-2xl text-left font-semibold text-lg transition-all active:scale-95 flex items-center gap-3 w-full";
            });

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-seconds').innerText = timeLeft + "s";
                if(timeLeft <= 5) document.getElementById('timer-seconds').classList.add('timer-low');
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    if (!hasSubmitted) timeoutAutoSubmit();
                }
            }, 1000);
        }

        async function selectOption(pickedLetter) {
            if(hasSubmitted) return;
            hasSubmitted = true;
            clearInterval(timerInterval);

            ['A', 'B', 'C', 'D'].forEach(opt => {
                const el = document.getElementById(`btn-opt${opt}`);
                el.disabled = true;
                if(opt === pickedLetter) {
                    el.classList.add('bg-purple-600/80', 'border-purple-400');
                } else {
                    el.classList.add('opacity-40');
                }
            });

            document.getElementById('input-container').classList.add('hidden');
            document.getElementById('blind-feedback').classList.remove('hidden');
            document.getElementById('status-text').innerText = `Choice locked in: Option ${pickedLetter}`;

            if(pickedLetter === currentCorrectAns) {
                await fetch(SCRIPT_URL, {
                    method: "POST", 
                    mode: "no-cors",
                    body: JSON.stringify({ 
                        action: "submitScore", 
                        user: teamName, 
                        points: currentPoints 
                    })
                });
            }
        }

        function timeoutAutoSubmit() {
            hasSubmitted = true;
            ['A', 'B', 'C', 'D'].forEach(opt => {
                document.getElementById(`btn-opt${opt}`).disabled = true;
                document.getElementById(`btn-opt${opt}`).classList.add('opacity-40');
            });
            document.getElementById('input-container').classList.add('hidden');
            document.getElementById('blind-feedback').classList.remove('hidden');
            document.getElementById('status-text').innerText = "TIME RAN OUT (No Choice Sent)";
        }
    </script>
</body>
</html>
